services:
  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    working_dir: /app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ../backend:/app
    env_file:
      - ../backend/.env
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0 -p 3000"
    volumes:
      - ../frontend-next:/app
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: the_haven
      POSTGRES_USER: the_haven
      POSTGRES_PASSWORD: the_haven
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
