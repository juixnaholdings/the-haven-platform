upstream haven_backend {
    server backend:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 20m;

    location /static/ {
        alias /srv/static/;
        access_log off;
        expires 1h;
    }

    location /media/ {
        alias /srv/media/;
        access_log off;
        expires 1h;
    }

    location /health/ {
        proxy_pass http://haven_backend/health/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://haven_backend;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
