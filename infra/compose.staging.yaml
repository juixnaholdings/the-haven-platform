services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./.env.staging
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    restart: unless-stopped
    working_dir: /app
    env_file:
      - ./.env.staging
    command: ["/app/infra/scripts/backend-entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/').read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  nginx:
    build:
      context: ..
      dockerfile: infra/docker/nginx.Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${STAGING_HTTP_PORT:-80}:80"
    volumes:
      - static_data:/srv/static:ro
      - media_data:/srv/media:ro

volumes:
  postgres_data:
  static_data:
  media_data:
