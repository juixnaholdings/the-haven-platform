<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Ekklesia</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary-fixed": "#001b3c",
                        "on-primary-fixed-variant": "#2d476f",
                        "outline-variant": "#c4c6cf",
                        "on-secondary-fixed": "#121c2b",
                        "on-tertiary-fixed": "#2b1700",
                        "surface-variant": "#e5e2dc",
                        "primary-fixed": "#d6e3ff",
                        "outline": "#74777f",
                        "inverse-on-surface": "#f3f0ea",
                        "surface-container-low": "#f6f3ed",
                        "inverse-surface": "#31312d",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#633f0f",
                        "on-secondary": "#ffffff",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#f2bc82",
                        "primary-container": "#1a365d",
                        "on-tertiary-container": "#c6955e",
                        "surface-bright": "#fcf9f3",
                        "on-surface": "#1c1c18",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#d9e3f8",
                        "on-secondary-container": "#5b6577",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed-variant": "#3e4758",
                        "tertiary-container": "#4f2e00",
                        "surface-container": "#f0eee8",
                        "tertiary": "#321b00",
                        "secondary-container": "#d9e3f8",
                        "secondary": "#555f70",
                        "on-tertiary": "#ffffff",
                        "on-background": "#1c1c18",
                        "surface": "#fcf9f3",
                        "on-error": "#ffffff",
                        "surface-tint": "#455f88",
                        "on-primary-container": "#86a0cd",
                        "background": "#fcf9f3",
                        "surface-container-highest": "#e5e2dc",
                        "secondary-fixed-dim": "#bdc7db",
                        "primary": "#002045",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#43474e",
                        "primary-fixed-dim": "#adc7f7",
                        "surface-container-high": "#ebe8e2",
                        "tertiary-fixed": "#ffddba",
                        "surface-dim": "#dcdad4",
                        "inverse-primary": "#adc7f7"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .clerical-gradient {
            background: linear-gradient(135deg, #002045 0%, #1a365d 100%);
        }
        .soft-elevation {
            box-shadow: 0 24px 48px -12px rgba(28, 28, 24, 0.04);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center p-6 selection:bg-primary-fixed selection:text-on-primary-fixed">
<div class="w-full max-w-[440px] flex flex-col items-center">
<!-- Logo/Branding Section -->
<div class="mb-10 text-center">
<div class="mb-6 inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-container-high">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="church">church</span>
</div>
<h1 class="text-3xl font-extrabold tracking-tight text-primary mb-2">Ekklesia</h1>
<p class="text-on-surface-variant font-medium tracking-wide text-sm">The Digital Vestry</p>
</div>
<!-- Login Card -->
<div class="w-full bg-surface-container-lowest rounded-xl soft-elevation p-10">
<div class="mb-8">
<h2 class="text-xl font-bold text-on-surface mb-1">Sign In</h2>
<p class="text-on-surface-variant text-sm">Access the administrative portal</p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface tracking-tight" for="email">Email Address</label>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-container-lowest border-0 ring-1 ring-outline-variant/30 rounded-lg focus:ring-2 focus:ring-primary transition-all duration-200 placeholder:text-outline/50 text-on-surface" id="email" name="email" placeholder="name@ministry.org" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-sm font-semibold text-on-surface tracking-tight" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-container-lowest border-0 ring-1 ring-outline-variant/30 rounded-lg focus:ring-2 focus:ring-primary transition-all duration-200 placeholder:text-outline/50 text-on-surface" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container-lowest" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-on-surface-variant font-medium" for="remember-me">Keep me signed in for 30 days</label>
</div>
<!-- Submit Button -->
<button class="w-full h-12 clerical-gradient text-on-primary font-bold rounded-full hover:opacity-90 active:scale-[0.98] transition-all duration-200 shadow-lg shadow-primary/10 flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-lg" data-icon="login">login</span>
</button>
</form>
<div class="mt-8 pt-8 border-t border-outline-variant/10 text-center">
<p class="text-sm text-on-surface-variant">
                    Authorized personnel only. 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Request Access</a>
</p>
</div>
</div>
<!-- Footer Decoration -->
<div class="mt-12 flex items-center gap-6 opacity-40">
<div class="h-[1px] w-12 bg-outline-variant"></div>
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="auto_awesome">auto_awesome</span>
<div class="h-[1px] w-12 bg-outline-variant"></div>
</div>
<p class="mt-6 text-[10px] uppercase tracking-[0.2em] font-bold text-on-surface-variant/60">
            Pro Ecclesia Et Patria
        </p>
</div>
<!-- Background Decorative Elements -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary-fixed/20 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] rounded-full bg-tertiary-fixed/20 blur-[120px]"></div>
</div>
</body></html>
