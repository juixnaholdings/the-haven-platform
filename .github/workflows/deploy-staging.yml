name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy to staging"
        required: true
        default: develop
      run_smoke_checks:
        description: "Run post-deploy smoke checks"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Configure SSH access
        shell: bash
        env:
          STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$STAGING_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$STAGING_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy staging stack
        shell: bash
        env:
          DEPLOY_REF: ${{ inputs.ref }}
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
        run: |
          ssh "$STAGING_SSH_USER@$STAGING_SSH_HOST" "cd '$STAGING_DEPLOY_PATH' && DEPLOY_REF='$DEPLOY_REF' sh infra/scripts/deploy_staging.sh"

      - name: Run post-deploy smoke checks
        if: ${{ inputs.run_smoke_checks }}
        shell: bash
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
        run: |
          chmod +x infra/scripts/staging_smoke_check.sh
          infra/scripts/staging_smoke_check.sh "$STAGING_BASE_URL"
